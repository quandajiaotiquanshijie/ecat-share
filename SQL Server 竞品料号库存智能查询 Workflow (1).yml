            type: mixed
            value: '{{#env.SQL_SERVER_USERNAME#}}'
        type: tool
      height: 96
      id: execute_sql_node
      position:
        x: 960
        y: 260
      positionAbsolute:
        x: 960
        y: 260
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "function parseMaybeJson(value, fallback) {\n  if (value == null) return\
          \ fallback;\n  if (typeof value === \"object\") return value;\n  try { return\
          \ JSON.parse(value); } catch (e) { return fallback; }\n}\n\nfunction rowsFromToolJson(toolJson)\
          \ {\n  const parsed = parseMaybeJson(toolJson, []);\n  const first = Array.isArray(parsed)\
          \ ? parsed[0] : parsed;\n  if (!first) return [];\n  if (Array.isArray(first.result))\
          \ return first.result;\n  if (first.status === \"success\" && Array.isArray(first.data))\
          \ return first.data;\n  if (Array.isArray(first.json_object?.result)) return\
          \ first.json_object.result;\n  return [];\n}\n\nfunction cell(value) {\n\
          \  if (value === null || value === undefined || value === \"\") return \"\
          -\";\n  return String(value).replace(/\\|/g, \"\\\\|\").replace(/\\n/g,\
          \ \" \");\n}\n\nfunction main({ question, sql, validation_error, tool_json,\
          \ tool_text }) {\n  if (validation_error) {\n    return {\n      answer:\
          \ \"SQL 安全校验未通过，已停止真实查询。\\n\\n原因：\" + validation_error + \"\\n\\n生成 SQL：\\\
          n\" + sql,\n      sql,\n      row_count: 0,\n      rows_json: \"[]\"\n \
          \   };\n  }\n\n  const rows = rowsFromToolJson(tool_json);\n  const lines\
          \ = [];\n  lines.push(\"SQL Server 查询完成。\");\n  lines.push(\"\");\n  lines.push(\"\
          问题：\" + (question || \"-\"));\n  lines.push(\"\");\n  lines.push(\"执行 SQL：\"\
          );\n  lines.push(\"```sql\");\n  lines.push(sql);\n  lines.push(\"```\"\
          );\n  lines.push(\"\");\n\n  if (!rows.length) {\n    lines.push(\"未查询到数据。\"\
          );\n    if (tool_text) lines.push(String(tool_text));\n    return { answer:\
          \ lines.join(\"\\n\"), sql, row_count: 0, rows_json: \"[]\" };\n  }\n\n\
          \  const headers = Object.keys(rows[0]).slice(0, 12);\n  lines.push(\"共返回\
          \ \" + rows.length + \" 条，展示前 \" + Math.min(rows.length, 20) + \" 条。\");\n\
          \  lines.push(\"\");\n  lines.push(\"| \" + headers.join(\" | \") + \" |\"\
          );\n  lines.push(\"|\" + headers.map(() => \"---\").join(\"|\") + \"|\"\
          );\n  rows.slice(0, 20).forEach(row => {\n    lines.push(\"| \" + headers.map(h\
          \ => cell(row[h])).join(\" | \") + \" |\");\n  });\n\n  return {\n    answer:\
          \ lines.join(\"\\n\"),\n    sql,\n    row_count: rows.length,\n    rows_json:\
          \ JSON.stringify(rows, null, 2)\n  };\n}"
        code_language: javascript
        desc: Format SQL Server rows for the user.
        outputs:
          answer:
            children: null
            type: string
          row_count:
            children: null
            type: number
          rows_json:
            children: null
            type: string
          sql:
            children: null
            type: string
        selected: false
        title: 整理结果
        type: code
