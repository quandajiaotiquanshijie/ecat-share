      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "function stripCodeFence(text) {\n  let s = String(text || \"\").trim();\n\
          \  s = s.replace(/^```(?:sql|tsql)?/i, \"\").replace(/```$/i, \"\").trim();\n\
          \  const match = s.match(/(?:SELECT|WITH)\\b[\\s\\S]*/i);\n  if (match)\
          \ s = match[0].trim();\n  return s.replace(/;+$/g, \"\").trim();\n}\n\n\
          function containsForbidden(sql) {\n  const cleaned = sql.replace(/'[^']*'/g,\
          \ \"''\");\n  const forbidden = /\\b(INSERT|UPDATE|DELETE|DROP|ALTER|CREATE|TRUNCATE|COPY|CALL|EXEC|EXECUTE|MERGE|GRANT|REVOKE|xp_|sp_)\\\
          b/i;\n  return forbidden.test(cleaned);\n}\n\nfunction hasAllowedTableOnly(sql)\
          \ {\n  const lower = sql.toLowerCase();\n  if (!lower.includes(\"dbo.competitor_to_bosch_mapping_rows\"\
          )) return false;\n  const tableRefs = lower.match(/\\b(from|join)\\s+([a-z0-9_\\\
          [\\]\\.\"]+)/g) || [];\n  return tableRefs.every(ref => ref.includes(\"\
          dbo.competitor_to_bosch_mapping_rows\"));\n}\n\nfunction injectTop(sql)\
          \ {\n  const lower = sql.toLowerCase();\n  const looksAggregate = /\\b(count|sum|avg|min|max)\\\
          s*\\(/i.test(sql) || /\\bgroup\\s+by\\b/i.test(sql);\n  if (looksAggregate)\
          \ return sql;\n  if (/^\\s*select\\s+top\\s*\\(/i.test(sql) || /^\\s*select\\\
          s+top\\s+\\d+/i.test(sql)) return sql;\n  if (/^\\s*select\\s+/i.test(sql))\
          \ return sql.replace(/^\\s*select\\s+/i, \"SELECT TOP (50) \");\n  return\
          \ sql;\n}\n\nfunction main({ raw_sql }) {\n  let sql = stripCodeFence(raw_sql);\n\
          \  const fallback = \"SELECT TOP (0) material, competitor_pn, oe_cross_ref,\
          \ stock_quantity FROM dbo.competitor_to_bosch_mapping_rows\";\n  const errors\
          \ = [];\n\n  if (!/^\\s*(select|with)\\b/i.test(sql)) errors.push(\"SQL\
          \ 必须以 SELECT 或 WITH 开头。\");\n  if (/;/.test(sql)) errors.push(\"SQL 只能包含一条语句。\"\
          );\n  if (/--|\\/\\*/.test(sql)) errors.push(\"SQL 不允许包含注释。\");\n  if (containsForbidden(sql))\
          \ errors.push(\"SQL 包含禁止的写入或执行类关键字。\");\n  if (!hasAllowedTableOnly(sql))\
          \ errors.push(\"SQL 只能查询 dbo.competitor_to_bosch_mapping_rows。\");\n  if\
          \ (/\\blimit\\b/i.test(sql)) errors.push(\"SQL Server 查询不能使用 LIMIT。\");\n\
          \  if (/select\\s+\\*/i.test(sql)) errors.push(\"不允许 SELECT *，请显式选择字段。\"\
          );\n\n  if (errors.length) {\n    return { sql: fallback, error: errors.join(\"\
          \ \") };\n  }\n\n  sql = injectTop(sql);\n  return { sql, error: \"\" };\n\
          }"
        code_language: javascript
        desc: Validate generated SQL before execution.
        outputs:
          error:
            children: null
            type: string
          sql:
            children: null
            type: string
        selected: false
        title: 校验SQL
        type: code
        variables:
        - value_selector:
          - generate_sql_node
          - text
          variable: raw_sql
