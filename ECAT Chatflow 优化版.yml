    - data:
        code: "import re\n\ndef main(table_array: list):\n    \"\"\"\n    table_array:\
          \ 迭代节点输出的 Array[String]\n    \"\"\"\n    if not table_array:\n        return\
          \ {\"final_report\": \"⚠️ 未接收到任何查询数据。\"}\n\n    total_parts = 0\n    clean_tables\
          \ = []\n    summary_rows = []\n    query_count = 0\n\n    for item in table_array:\n\
          \        if item is None or not isinstance(item, str):\n            continue\n\
          \        \n        query_count += 1\n        \n        # 1. 提取数量标记 [COUNT:X]\n\
          \        count_match = re.search(r'\\[COUNT:(\\d+)\\]', item)\n        count\
          \ = 0\n        if count_match:\n            count = int(count_match.group(1))\n\
          \            total_parts += count\n            # 移除标记\n            item\
          \ = item.replace(count_match.group(0), \"\")\n            \n        # 2.\
          \ 【核心修复】：精准匹配标题中的 VIN 码\n        # 匹配格式为：车辆 VIN: (17位字符)\n        vin_match\
          \ = re.search(r'车辆 VIN:\\s*([A-HJ-NPR-Z0-9]{17})', item)\n        \n   \
          \     # 如果正则没匹配到，尝试通用匹配（匹配标题冒号后的内容）\n        if not vin_match:\n       \
          \     vin_match = re.search(r'车辆 VIN:\\s*(\\w+)', item)\n            \n\
          \        vin = vin_match.group(1) if vin_match else \"未知车辆\"\n        \n\
          \        summary_rows.append(f\"| {vin} | **{count}** |\")\n        clean_tables.append(item)\n\
          \n    # 3. 构造最终 Markdown\n    header = \"## \U0001F4CA 批量查询汇总报告\\n\"\n \
          \   summary_table = \"| \U0001F697 车辆 VIN 码 | \U0001F4E6 匹配备件数量 |\\n| :---\
          \ | :--- |\\n\" + \"\\n\".join(summary_rows)\n    \n    footer = (\n   \
          \     f\"\\n\\n> **统计摘要**\\n\"\n        f\"> * 本次成功查询车辆: **{query_count}**\
          \ 台\\n\"\n        f\"> * 累计匹配雨刮产品: **{total_parts}** 件\\n\\n---\\n\"\n \
          \   )\n    \n    details = \"# \U0001F50E 详细查询结果清单\\n\" + \"\".join(clean_tables)\n\
          \    \n    return {\n        \"final_report\": header + summary_table +\
          \ footer + details\n    }"
        code_language: python3
