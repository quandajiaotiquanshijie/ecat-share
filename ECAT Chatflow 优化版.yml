    - data:
        code: "import re\n\ndef main(full_report: str, user_goal: str):\n    # 1.\
          \ 判定是否为全量查询\n    is_full = any(word in user_goal for word in [\"全量\", \"\
          全部\", \"所有\", \"展示\"])\n    \n    # 2. 按车辆标题切分报告 (使用正则兼容各种空格情况)\n    vin_sections\
          \ = re.split(r'(?=### \U0001F697 车辆 VIN:)', full_report)\n    header_info\
          \ = vin_sections[0] if not vin_sections[0].strip().startswith('###') else\
          \ \"\"\n    vin_blocks = [s for s in vin_sections if s.strip().startswith('###')]\n\
          \    \n    final_output = [header_info] if header_info else []\n    keyword\
          \ = user_goal.strip()\n\n    for block in vin_blocks:\n        lines = block.strip().split('\\\
          n')\n        if not lines: continue\n        \n        # 提取当前块的 VIN\n  \
          \      vin_match = re.search(r'VIN:\\s*([A-Z0-9]{17})', lines[0])\n    \
          \    current_vin = vin_match.group(1) if vin_match else \"识别中\"\n      \
          \  \n        if is_full:\n            final_output.append(block)\n     \
          \       continue\n\n        # 筛选逻辑\n        header_lines = []\n        data_rows\
          \ = []\n        is_table_started = False\n        \n        for line in\
          \ lines:\n            if line.startswith('| VIN') or line.startswith('|\
          \ :---'):\n                is_table_started = True\n                header_lines.append(line)\n\
          \            elif is_table_started and line.startswith('|'):\n         \
          \       # 只有包含关键词的行才保留\n                if keyword in line:\n          \
          \          data_rows.append(line)\n            elif not is_table_started:\n\
          \                header_lines.append(line)\n\n        # 组装输出：如果有匹配行则显示表格，否则显示友好提示\n\
          \        if data_rows:\n            # 关键：确保标题、表头、数据行之间都有换行符\n          \
          \  final_output.append(\"\\n\".join(header_lines) + \"\\n\" + \"\\n\".join(data_rows))\n\
