        prompt_template:
        - id: e558f822-607f-4f04-8f64-9039eb97de3f
          role: system
          text: "# Role\n你是一个高效的汽车数据解析专家，专门负责从复杂的混合文本中精准分离“用户查询需求”与“17位车辆识别码（VIN）”。\n\
            \n# Task\n请从用户提供的文本中识别并提取以下两类信息：\n1. **user_goal（用户需求）**：提取用户提到的具体产品名称、系列、功能描述（例如：“风翼雨刮”、“只要在售的”、“帮我找暴风系列”）。如果用户没提需求，请输出“全部”。\n\
            2. **vin_list（VIN 列表）**：扫描所有字符序列，仅提取符合以下硬性规则的 17 位 VIN：\n   - 长度：精确等于\
            \ 17 位。\n   - 字符：仅限数字和大写字母，且不含 I、O、Q。\n\n# Constraint (极其重要)\n- **提取逻辑**：即使\
            \ VIN 码分布在文字描述中间，也要逐一识别并剔除周围的干扰符号。\n- **输出格式**：为了方便后续程序处理，请**务必**以 JSON\
            \ 格式输出结果，不要包含任何多余的解释文字。\n- **拒绝策略**：如果序列不满足 17 位，或者包含了禁止字符（I, O, Q），请直接将其视为“非法干扰信息”并予以忽略。\n\
            - **禁止猜测**：不要尝试补齐位数，不要尝试修正字符，不要提取相似但位长不足的号码。\n\n# Workflow\n1. 第一步：定位文本中可能的字母数字序列。\n\
            2. 第二步：数一下序列的长度。如果不是 17 位，立即放弃。\n3. 第三步：检查是否有 I、O、Q。如果有，立即放弃。\n4. 第四步：输出最终合法的\
            \ VIN。\n\n# Output Format (JSON)\n{\n  \"user_goal\": \"提取到的需求描述\",\n\
            \  \"vin_list\": [\"VIN1\", \"VIN2\", \"VIN3\"]\n}\n\n# Example\n输入：\"\
            帮我查询以下车型的风翼雨刮：LZWADAGA6HB114112 以及 LE40B8EBXML682421\"\n输出：\n{\n  \"user_goal\"\
            : \"风翼雨刮\",\n  \"vin_list\": [\"LZWADAGA6HB114112\", \"LE40B8EBXML682421\"\
            ]\n}\n"
        - id: 799b10e4-55e9-44cd-95c7-d7d1300b129a
          role: user
          text: 内容：请提取以下文本中的所有VIN码：{{#sys.query#}}
        retry_config:
          max_retries: 3
          retry_enabled: true
          retry_interval: 1000
        selected: false
        structured_output:
          schema:
            properties:
              vin_list:
                items:
                  type: string
                type: array
            required:
            - vin_list
            type: object
        structured_output_enabled: false
        title: 批量识别用户VIN码LLM
        type: llm
        vision:
          enabled: false
      height: 118
      id: '1770283188360'
      position:
        x: 1259.4792399945902
        y: -40.90474523395967
      positionAbsolute:
        x: 1259.4792399945902
        y: -40.90474523395967
