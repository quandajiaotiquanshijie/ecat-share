    - data:
        code: "const crypto = require('crypto');\r\n\r\nfunction main({ categories,\
          \ carIdsString }) {\r\n    const keyStr = '8q7f15a4oc212ef3';\r\n    const\
          \ ivStr = '8q7f15a4oc212ef3';\r\n\r\n    function normalize(val) {\r\n \
          \       if (Array.isArray(val)) return val.join(',');\r\n        if (val\
          \ === undefined || val === null) return '';\r\n        return String(val);\r\
          \n    }\r\n\r\n    function aesEncrypt(data) {\r\n        const text = normalize(data);\r\
          \n        const cipher = crypto.createCipheriv('aes-128-cbc', keyStr, ivStr);\r\
          \n        cipher.setAutoPadding(true);\r\n        let encrypted = cipher.update(text,\
          \ 'utf8', 'base64');\r\n        encrypted += cipher.final('base64');\r\n\
          \r\n        // 【修正点】：只保留一级 encode\r\n        // Dify 的 HTTP 节点 Params 表格会自动把\
          \ % 变成 %25\r\n        // 这样发出去的请求正好是博世要求的二级转码格式\r\n        return encodeURIComponent(encrypted);\r\
          \n    }\r\n\r\n    // 针对已经加密好的固定字符串，也只做一级转码\r\n    function fixEncode(str)\
          \ {\r\n        return encodeURIComponent(str);\r\n    }\r\n\r\n    return\
          \ {\r\n        enc_categories: aesEncrypt(categories),\r\n        enc_carIds:\
          \ aesEncrypt(carIdsString),\r\n        enc_partNo: aesEncrypt(''),\r\n \
          \       enc_isEffectiveMapping: aesEncrypt('1'),\r\n        enc_partOnSale:\
          \ aesEncrypt(''),\r\n        enc_languageType: aesEncrypt('zh-cn'), // 建议检查此处原始值是否为数字\
          \ 3 或字符串 'zh-cn'\r\n        enc_levelIds: fixEncode('S7KtD73tWxTqR0IVCN43GEPbFyYecXzO5MJh/9zll30KEo0lOR5AGutlilCr/8N9')\r\
          \n    };\r\n}"
