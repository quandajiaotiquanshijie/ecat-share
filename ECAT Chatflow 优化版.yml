    - data:
        code: "import json\n\ndef main(http_response: str, current_vin: str):\n  \
          \  # 1. 前置防御：检查输入是否为空或无效\n    if not http_response or http_response == \"\
          null\":\n        return {\n            \"markdown_table\": f\"[COUNT:0]###\
          \ \U0001F697 车辆 VIN: {current_vin}\\n⚠️ 接口请求失败或返回空数据，请检查网络或 VIN 码有效性。\\\
          n\\n\"\n        }\n\n    try:\n        # 2. 安全解析 JSON\n        if isinstance(http_response,\
          \ str):\n            try:\n                data = json.loads(http_response)\n\
          \            except json.JSONDecodeError:\n                # 如果返回的不是标准 JSON，记录错误并跳过\n\
          \                return {\"markdown_table\": f\"[COUNT:0]### \U0001F697\
          \ 车辆 VIN: {current_vin}\\n⚠️ 接口数据格式异常，无法解析。\\n\\n\"}\n        else:\n  \
          \          data = http_response\n            \n        result_data = data.get(\"\
          resultData\") or {}\n        part_list = result_data.get(\"partList\") or\
          \ []\n        \n        # 预定义表头\n        header = \"| VIN 码 | 别称 | 物料号 |\
          \ 状态 | 产品名称 | 二级名称 | 年份 | 尺寸 | 备注 |\\n\"\n        sep = \"| :--- | :---\
          \ | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\\n\"\n        rows\
          \ = []\n\n        for item in part_list:\n            # --- 过滤逻辑：只保留包含“雨刮”的产品\
          \ ---\n            product_name = item.get(\"partName\") or \"\"\n     \
          \       sub_category = item.get(\"category2Name\") or \"\"\n           \
          \ \n            if \"雨刮\" not in product_name and \"雨刮\" not in sub_category:\n\
          \                continue\n\n            # 基础信息提取\n            alias = item.get(\"\
          typeFormular\") or \"-\"\n            part_no = item.get(\"partNo\") or\
          \ \"-\"\n            status = item.get(\"partNoStatus\") or \"-\"\n    \
          \        \n            # 状态图标美化（不删除文字，仅增加符号）\n            display_status\
          \ = f\"✅ {status}\" if status == \"在售\" else f\"❌ {status}\" if status ==\
          \ \"停产\" else status\n            \n            # 提取年份\n            year_list\
          \ = item.get(\"carsModelYearList\")\n            year_str = \" / \".join(sorted(list(set(map(str,\
          \ year_list))))) if year_list else \"-\"\n\n            # 提取尺寸/特征\n    \
          \        features = item.get(\"partFeatureValueList\") or []\n         \
          \   feature_parts = [f\"{f.get('featureNameCn')}:{f.get('featureValueString')}\"\
          \ \n                             for f in features if f.get('featureValueString')\
          \ not in [\"否\", \"无\", \"\"]]\n            size_str = \"<br>\".join(feature_parts)\
          \ if feature_parts else \"-\"\n            \n            # 提取备注\n      \
          \      remark = item.get(\"appDesEn\") or item.get(\"specInfo\") or \"-\"\
          \n\n            # 组装行（保持移除反引号的状态）\n            rows.append(f\"| {current_vin}\
          \ | {alias} | {part_no} | {display_status} | {product_name} | {sub_category}\
          \ | {year_str} | {size_str} | {remark} |\")\n\n        # 重新计算过滤后的数量\n  \
          \      filtered_count = len(rows)\n\n        if rows:\n            result\
          \ = f\"[COUNT:{filtered_count}]### \U0001F697 车辆 VIN: {current_vin} (匹配雨刮类产品:\
          \ {filtered_count}件)\\n\" + header + sep + \"\\n\".join(rows) + \"\\n\\\
          n\"\n        else:\n            result = f\"[COUNT:0]### \U0001F697 车辆 VIN:\
          \ {current_vin}\\n⚠️ 该车辆未查询到匹配的雨刮类备件。\\n\\n\"\n\n        return {\n    \
          \        \"markdown_table\": result\n        }\n        \n    except Exception\
          \ as e:\n        # 3. 终极兜底：任何代码执行错误都会被捕捉并转化为 Markdown 提示，避免节点崩溃\n      \
          \  return {\n            \"markdown_table\": f\"[COUNT:0]### \U0001F697\
          \ 车辆 VIN: {current_vin}\\n❌ 解析过程发生致命错误: {str(e)}\\n\\n\"\n        }"
