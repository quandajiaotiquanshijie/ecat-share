    - data:
        code: "import json\nimport re\n\ndef main(llm_output: str):\n    vin_array\
          \ = []\n    user_requirement = \"\"\n\n    try:\n        # 1. 尝试解析 JSON\n\
          \        clean_json_match = re.search(r'(\\{.*\\})', llm_output, re.DOTALL)\n\
          \        if clean_json_match:\n            data = json.loads(clean_json_match.group(1))\n\
          \            vin_array = data.get(\"vin_list\", [])\n            user_requirement\
          \ = data.get(\"user_goal\", \"\").strip()\n        \n        # 2. 如果 JSON\
          \ 解析失败，使用正则兜底提取 VIN\n        if not vin_array:\n            vin_array =\
          \ re.findall(r'[A-HJ-NPR-Z0-9]{17}', llm_output)\n\n        # 3. 智能判定：用户到底有没有“真正的”个性化需求\n\
          \        # 如果 user_requirement 为空，或者长度太短，或者包含常见的客套废话\n        stop_words\
          \ = [\"全部\", \"查询\", \"一下\", \"请帮我\", \"结果\", \"VIN\", \"列表\", \"车型\", \"\
          如下\"]\n        \n        # 清洗掉干扰字符后的纯净需求文本\n        pure_goal = re.sub(r'[#`*解析输出：\\\
          s\\n\\[\\]{}:：]', '', user_requirement)\n        \n        # 判断逻辑：\n   \
          \     # 如果纯净需求为空，或者长度小于 2 个字，或者需求里全是客套话\n        is_meaningless = not pure_goal\
          \ or len(pure_goal) < 2 or all(word in pure_goal for word in [\"查询\", \"\
          结果\"])\n        \n        if is_meaningless:\n            # 这种情况下，给 LLM\
          \ 发送“全量展示”指令\n            final_goal = \"全量展示，不要过滤任何行\"\n        else:\n\
          \            final_goal = pure_goal\n\n        return {\n            \"\
          vin_list\": vin_array,\n            \"user_goal\": final_goal\n        }\n\
          \        \n    except Exception as e:\n        return {\n            \"\
          vin_list\": re.findall(r'[A-HJ-NPR-Z0-9]{17}', llm_output),\n          \
          \  \"user_goal\": \"全量展示\"\n        }"
        code_language: python3
