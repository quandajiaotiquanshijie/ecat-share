    - data:
        code: "function safeJsonParse(value, fallback) {\n  if (!value) return fallback;\n\
          \  if (typeof value === \"object\") return value;\n  try {\n    return JSON.parse(value);\n\
          \  } catch (e) {\n    return fallback;\n  }\n}\n\nfunction main({\n  http_body,\n\
          \  part_success,\n  part_no,\n  part_name,\n  part_reason,\n  target_source,\n\
          \  target_car_ids,\n  target_count,\n  candidate_vehicles_json\n}) {\n \
          \ if (!part_success) {\n    return {\n      fit: \"uncertain\",\n      confidence:\
          \ \"low\",\n      reason: part_reason,\n      matched_vehicles_json: \"\
          []\",\n      result: part_reason\n    };\n  }\n\n  const requestedIds =\
          \ String(target_car_ids || \"\").split(\",\").map(v => v.trim()).filter(Boolean);\n\
          \  if (!requestedIds.length) {\n    return {\n      fit: \"uncertain\",\n\
          \      confidence: \"low\",\n      reason: \"缺少可校验车型。请提供 car_id，或提供 VIN\
          \ / 更明确车型描述先解析车型。\",\n      matched_vehicles_json: \"[]\",\n      result:\
          \ \"无法判断适配：缺少可校验车型。请提供 car_id，或提供 VIN / 更明确车型描述。\"\n    };\n  }\n\n  const\
          \ data = safeJsonParse(http_body, {});\n  const vo = data?.resultData?.partVOList?.[0]\
          \ || {};\n  const carDetailList = Array.isArray(vo.carDetailList) ? vo.carDetailList\
          \ : [];\n  const requested = new Set(requestedIds);\n  const matched = carDetailList.filter(row\
          \ => requested.has(String(row.carId || \"\")));\n  const candidateVehicles\
          \ = safeJsonParse(candidate_vehicles_json, []);\n\n  let fit = \"false\"\
          ;\n  let confidence = target_source === \"vehicle_query\" ? \"medium\" :\
          \ \"high\";\n  let reason = `ECAT 查询结果未显示料号 ${part_no} 适配目标车型。`;\n\n  if\
          \ (matched.length > 0) {\n    fit = \"true\";\n    confidence = target_source\
          \ === \"vehicle_query\" ? \"medium\" : \"high\";\n    reason = `ECAT 查询结果显示料号\
          \ ${part_no} 适配目标车型。`;\n  } else if (target_source === \"vehicle_query\"\
          \ && Number(target_count || 0) > 1) {\n    fit = \"uncertain\";\n    confidence\
          \ = \"low\";\n    reason = \"车型文字解析到了多个候选，但当前候选范围内未命中适配；建议先让用户确认具体 car_id\
          \ 后再判断。\";\n  }\n\n  const matchedVehicles = matched.map((row, index) =>\
          \ ({\n    index: index + 1,\n    car_id: row.carId || \"\",\n    display_name:\
          \ row.carFullInfo || \"\",\n    year_range: row.producedYear && row.discontinuedYear\
          \ && row.producedYear !== row.discontinuedYear\n      ? `${row.producedYear}-${row.discontinuedYear}`\n\
          \      : (row.modelYear || row.producedYear || row.discontinuedYear || \"\
          \"),\n    engine: row.engineCode || \"\",\n    displacement: row.displacement\
          \ || \"\"\n  }));\n\n  const lines = [];\n  lines.push(`适配判断：${fit}`);\n\
          \  lines.push(\"\");\n  lines.push(`原因：${reason}`);\n  lines.push(\"\");\n\
          \  lines.push(`料号：${part_no}${part_name ? `（${part_name}）` : \"\"}`);\n\
          \  lines.push(`车型来源：${target_source || \"-\"}`);\n  lines.push(`校验车型ID：${requestedIds.join(\"\
          , \")}`);\n\n  if (matchedVehicles.length) {\n    lines.push(\"\");\n  \
          \  lines.push(\"| 序号 | car_id | 车型信息 | 年款/生产年 | 发动机 | 排量 |\");\n    lines.push(\"\
          |---:|---|---|---|---|---|\");\n    matchedVehicles.forEach(v => {\n   \
          \   lines.push(`| ${v.index} | ${v.car_id || \"-\"} | ${v.display_name ||\
          \ \"-\"} | ${v.year_range || \"-\"} | ${v.engine || \"-\"} | ${v.displacement\
          \ || \"-\"} |`);\n    });\n  }\n\n  if (target_source === \"vehicle_query\"\
          \ && candidateVehicles.length) {\n    lines.push(\"\");\n    lines.push(\"\
          车型文字候选：\");\n    candidateVehicles.slice(0, 5).forEach((v, index) => {\n\
          \      lines.push(`${index + 1}. ${v.car_id || \"-\"} - ${v.display_name\
          \ || \"-\"}`);\n    });\n  }\n\n  return {\n    fit,\n    confidence,\n\
          \    reason,\n    matched_vehicles_json: JSON.stringify(matchedVehicles,\
          \ null, 2),\n    result: lines.join(\"\\n\")\n  };\n}"
