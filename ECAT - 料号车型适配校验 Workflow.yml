    - data:
        code: "function safeJsonParse(value, fallback) {\n  if (!value) return fallback;\n\
          \  if (typeof value === \"object\") return value;\n  try {\n    return JSON.parse(value);\n\
          \  } catch (e) {\n    return fallback;\n  }\n}\n\nfunction idsFromVinBody(body)\
          \ {\n  const data = safeJsonParse(body, {});\n  const rd = data.resultData\
          \ || {};\n  if (rd.carIds) {\n    return String(rd.carIds).split(\",\").map(v\
          \ => v.trim()).filter(Boolean);\n  }\n  const list = Array.isArray(rd.carInfoList)\
          \ ? rd.carInfoList : [];\n  return list.map(v => String(v.carId || \"\"\
          ).trim()).filter(Boolean);\n}\n\nfunction idsFromVehicleQueryBody(body)\
          \ {\n  const rows = safeJsonParse(body, []);\n  if (!Array.isArray(rows))\
          \ return [];\n  return rows.map(row => String(row.car_id || row.carId ||\
          \ \"\").trim()).filter(Boolean);\n}\n\nfunction vehicleSummaryFromQueryBody(body)\
          \ {\n  const rows = safeJsonParse(body, []);\n  if (!Array.isArray(rows))\
          \ return [];\n  return rows.slice(0, 10).map(row => ({\n    car_id: row.car_id\
          \ || row.carId || \"\",\n    display_name: row.car_full_info || row.carFullInfo\
          \ || \"\",\n    model_year: row.model_year || row.modelYear || \"\",\n \
          \   engine: row.engine_code || row.engineCode || \"\"\n  }));\n}\n\nfunction\
          \ main({\n  part_success,\n  part_id,\n  part_no,\n  part_reason,\n  car_ids,\n\
          \  vin,\n  vehicle_query,\n  vin_body,\n  vehicle_query_body\n}) {\n  let\
          \ source = \"\";\n  let targetIds = [];\n  let candidateVehicles = [];\n\
          \n  if (car_ids) {\n    source = \"car_id\";\n    targetIds = String(car_ids).split(\"\
          ,\").filter(Boolean);\n  } else if (vin) {\n    source = \"vin\";\n    targetIds\
          \ = idsFromVinBody(vin_body);\n  } else if (vehicle_query) {\n    source\
          \ = \"vehicle_query\";\n    targetIds = idsFromVehicleQueryBody(vehicle_query_body);\n\
          \    candidateVehicles = vehicleSummaryFromQueryBody(vehicle_query_body);\n\
          \  }\n\n  const queryUrl =\n    \"https://boschaftermarket.com.cn/ecat_backend/ecat-service/api/part/car/web/query\"\
          \ +\n    \"?partIds=\" + encodeURIComponent(part_id || \"__INVALID__\")\
          \ +\n    (targetIds.length ? \"&carIds=\" + encodeURIComponent(targetIds.join(\"\
          ,\")) : \"\") +\n    \"&languageType=zh-cn\";\n\n  return {\n    success:\
          \ Boolean(part_success && part_id),\n    query_url: queryUrl,\n    part_no,\n\
          \    part_id: part_id || \"\",\n    target_source: source || \"\",\n   \
          \ target_car_ids: targetIds.join(\",\"),\n    target_count: targetIds.length,\n\
          \    candidate_vehicles_json: JSON.stringify(candidateVehicles, null, 2),\n\
          \    reason: part_success ? \"构造适配校验 URL 成功。\" : part_reason\n  };\n}"
        code_language: javascript
