    - data:
        code: "function clean(v) {\n  return String(v || \"\").trim();\n}\n\nfunction\
          \ normalizePartNo(value) {\n  let partNo = clean(value).toUpperCase().replace(/[^A-Z0-9]/g,\
          \ \"\");\n  if (partNo.length > 10) partNo = partNo.slice(0, 10);\n  return\
          \ partNo;\n}\n\nfunction normalizeVehicleIds(value) {\n  return clean(value)\n\
          \    .split(/[,\\s，、/]+/)\n    .map(v => v.replace(/\\D/g, \"\"))\n    .filter(Boolean)\n\
          \    .join(\",\");\n}\n\nfunction normalizeVin(value) {\n  const vin = clean(value).toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g,\
          \ \"\");\n  return /^[A-HJ-NPR-Z0-9]{17}$/.test(vin) ? vin : \"\";\n}\n\n\
          function normalizeVehicleText(text) {\n  let s = clean(text);\n  s = s.replace(/([\\\
          u4e00-\\u9fa5])([A-Za-z0-9])/g, \"$1 $2\");\n  s = s.replace(/([A-Za-z0-9])([\\\
          u4e00-\\u9fa5])/g, \"$1 $2\");\n  s = s.replace(/[，,。;；、/\\\\|()[\\]【】{}<>《》:：\\\
          -—_+]/g, \" \");\n  s = s.replace(/\\s+/g, \" \").trim();\n  return s;\n\
          }\n\nfunction enc(v) {\n  return encodeURIComponent(clean(v));\n}\n\nfunction\
          \ extractTerms(text) {\n  const normalized = normalizeVehicleText(text);\n\
          \  const rawTerms = normalized.match(/[\\u4e00-\\u9fa5A-Za-z0-9·.]+/g) ||\
          \ [];\n  return Array.from(new Set(rawTerms.map(clean).filter(v => v.length\
          \ >= 2))).slice(0, 8);\n}\n\nfunction buildVehicleQueryUrl(vehicleQuery)\
          \ {\n  const base = \"https://sdmfcaryqtnyukafzhip.supabase.co/rest/v1/vehicle_master\"\
          ;\n  const select = [\n    \"car_id\",\n    \"car_full_info\",\n    \"model_year\"\
          ,\n    \"displacement\",\n    \"engine_code\",\n    \"manufacturer\",\n\
          \    \"model_class\"\n  ].join(\",\");\n  const terms = extractTerms(vehicleQuery);\n\
          \  const params = [\"select=\" + encodeURIComponent(select), \"order=model_year.desc\"\
          ];\n  if (!terms.length) {\n    params.push(\"limit=0\");\n  } else {\n\
          \    params.push(\"limit=10\");\n    const filters = terms.map(term => `car_full_info.ilike.*${enc(term)}*`);\n\
          \    params.push(\"and=(\" + filters.join(\",\") + \")\");\n  }\n  return\
          \ { url: base + \"?\" + params.join(\"&\"), terms };\n}\n\nfunction main({\
          \ part_no, car_id, vin, vehicle_query }) {\n  const partNo = normalizePartNo(part_no);\n\
          \  const carIds = normalizeVehicleIds(car_id);\n  const vinCode = normalizeVin(vin);\n\
          \  const vehicleText = normalizeVehicleText(vehicle_query);\n  const vehicleQuery\
          \ = buildVehicleQueryUrl(vehicleText);\n\n  return {\n    part_no: partNo,\n\
          \    part_is_valid: /^[A-Z0-9]{6,10}$/.test(partNo),\n    car_ids: carIds,\n\
          \    vin: vinCode,\n    vehicle_query: vehicleText,\n    vehicle_query_url:\
          \ vehicleQuery.url,\n    vehicle_query_terms: vehicleQuery.terms,\n    vin_query_url:\n\
          \      \"https://boschaftermarket.com.cn/ecat_backend/ecat-service/api/car/query-vinCode?vinCode=\"\
          \ +\n      encodeURIComponent(vinCode) +\n      \"&languageType=zh-cn\"\n\
          \  };\n}"
        code_language: javascript
        desc: Normalize part and vehicle inputs.
        outputs:
          car_ids:
            children: null
            type: string
          part_is_valid:
            children: null
            type: boolean
          part_no:
            children: null
            type: string
          vehicle_query:
            children: null
            type: string
          vehicle_query_terms:
            children: null
            type: array[string]
          vehicle_query_url:
            children: null
            type: string
          vin:
            children: null
            type: string
          vin_query_url:
            children: null
