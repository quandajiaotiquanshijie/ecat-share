    - data:
        code: "function safeJsonParse(value, fallback) {\n  if (!value) return fallback;\n\
          \  if (typeof value === \"object\") return value;\n  try {\n    return JSON.parse(value);\n\
          \  } catch (e) {\n    return fallback;\n  }\n}\n\nfunction normalize(v)\
          \ {\n  return String(v || \"\").trim().replace(/\\s+/g, \"\").toLowerCase();\n\
          }\n\nfunction expandTerms(partKeyword) {\n  const key = normalize(partKeyword);\n\
          \  const terms = new Set([key]);\n  const synonymGroups = [\n    [\"雨刮\"\
          , \"雨刷\", \"刮水器\", \"风翼\", \"神翼\", \"wiper\"],\n    [\"刹车片\", \"制动片\", \"\
          前片\", \"后片\", \"刹车\", \"制动\"],\n    [\"机油滤清器\", \"机滤\", \"机油滤\", \"滤清器\"\
          ],\n    [\"空气滤清器\", \"空滤\", \"空气滤\"],\n    [\"空调滤清器\", \"空调滤\", \"空调滤芯\"\
          ],\n    [\"火花塞\", \"sparkplug\"],\n    [\"蓄电池\", \"电瓶\", \"battery\"],\n\
          \    [\"发动机油\", \"机油\", \"润滑油\"]\n  ];\n  synonymGroups.forEach(group =>\
          \ {\n    if (group.some(item => key.includes(normalize(item)) || normalize(item).includes(key)))\
          \ {\n      group.forEach(item => terms.add(normalize(item)));\n    }\n \
          \ });\n  return Array.from(terms).filter(Boolean);\n}\n\nfunction main({\
          \ http_body, part_keyword, matched_category_text }) {\n  const data = safeJsonParse(http_body,\
          \ {});\n  const partList = data?.resultData?.partList || [];\n  const totalCounts\
          \ = data?.resultData?.totalCounts || partList.length || 0;\n  const terms\
          \ = expandTerms(part_keyword);\n\n  const mapped = partList.map((p, index)\
          \ => {\n    const features = Array.isArray(p.partFeatureValueList) ? p.partFeatureValueList\
          \ : [];\n    const specs = features\n      .map(f => `${f.featureNameCn\
          \ || f.featureName || \"\"}:${f.featureValueString || f.featureValue ||\
          \ \"\"}`)\n      .filter(v => v && !v.endsWith(\":\"));\n    return {\n\
          \      index: index + 1,\n      part_no: p.partNo || \"\",\n      alias:\
          \ p.typeFormular || \"\",\n      status: p.partNoStatus || \"\",\n     \
          \ part_name: p.partName || \"\",\n      category1Name: p.category1Name ||\
          \ \"\",\n      category2Name: p.category2Name || \"\",\n      remark: p.appDesEn\
          \ || p.appDesCn || \"\",\n      model_years: Array.isArray(p.carsModelYearList)\
          \ ? p.carsModelYearList.join(\", \") : \"\",\n      specs: specs.join(\"\
          ; \")\n    };\n  });\n\n  let filtered = mapped.filter(row => {\n    const\
          \ haystack = normalize([\n      row.part_no,\n      row.alias,\n      row.part_name,\n\
          \      row.category1Name,\n      row.category2Name,\n      row.remark,\n\
          \      row.specs\n    ].join(\" \"));\n    return terms.some(term => haystack.includes(term));\n\
          \  });\n\n  if (filtered.length === 0 && mapped.length > 0) {\n    filtered\
          \ = mapped.slice(0, 20);\n  } else {\n    filtered = filtered.slice(0, 20);\n\
          \  }\n\n  if (filtered.length === 0) {\n    return {\n      success: false,\n\
          \      total_count: 0,\n      parts_json: \"[]\",\n      result: `${matched_category_text}\\\
          n\\n未查询到“${part_keyword}”对应配件。`\n    };\n  }\n\n  const lines = [];\n  lines.push(`车型配件查询完成。ECAT\
          \ 返回 ${totalCounts} 条，当前展示 ${filtered.length} 条。`);\n  lines.push(\"\");\n\
          \  lines.push(\"| 序号 | 物料号 | 别称 | 状态 | 名称 | 分类 | 适配年份 | 规格 |\");\n  lines.push(\"\
          |---:|---|---|---|---|---|---|---|\");\n  filtered.forEach(row => {\n  \
          \  lines.push(`| ${row.index} | ${row.part_no || \"-\"} | ${row.alias ||\
          \ \"-\"} | ${row.status || \"-\"} | ${row.part_name || \"-\"} | ${[row.category1Name,\
          \ row.category2Name].filter(Boolean).join(\" / \") || \"-\"} | ${row.model_years\
          \ || \"-\"} | ${(row.specs || \"-\").replace(/\\|/g, \"\\\\|\")} |`);\n\
          \  });\n\n  return {\n    success: true,\n    total_count: totalCounts,\n\
          \    parts_json: JSON.stringify(filtered, null, 2),\n    result: lines.join(\"\
          \\n\")\n  };\n}"
        code_language: javascript
