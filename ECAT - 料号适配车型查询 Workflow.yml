    - data:
        code: "function safeJsonParse(value, fallback) {\n  if (!value) return fallback;\n\
          \  if (typeof value === \"object\") return value;\n  try {\n    return JSON.parse(value);\n\
          \  } catch (e) {\n    return fallback;\n  }\n}\n\nfunction yearRange(row)\
          \ {\n  const start = row.producedYear || row.modelYear || \"\";\n  const\
          \ end = row.discontinuedYear || row.shutdownYear || row.modelYear || \"\"\
          ;\n  if (start && end && start !== end) return `${start}-${end}`;\n  return\
          \ start || end || \"\";\n}\n\nfunction main({ http_body, part_success, part_no,\
          \ part_name, part_id, part_reason }) {\n  if (!part_success) {\n    return\
          \ {\n      success: false,\n      part_no,\n      vehicle_count: 0,\n  \
          \    vehicles_json: \"[]\",\n      result: part_reason\n    };\n  }\n\n\
          \  const data = safeJsonParse(http_body, {});\n  const resultData = data.resultData\
          \ || {};\n  const carInfoList = Array.isArray(resultData.carInfoList) ?\
          \ resultData.carInfoList : [];\n  const total = resultData.pageInfo?.totalCounts\
          \ || resultData.totalCounts || carInfoList.length;\n  const vehicles = carInfoList.map((row,\
          \ index) => ({\n    index: index + 1,\n    car_id: row.carId || \"\",\n\
          \    display_name: row.carFullInfo || \"\",\n    year_range: yearRange(row),\n\
          \    model_year: row.modelYear || \"\",\n    engine: row.engineCode || \"\
          \",\n    displacement: row.displacement || \"\",\n    manufacturer: row.manufacturer\
          \ || \"\",\n    model_class: row.modelClass || \"\",\n    driving_form:\
          \ row.drivingForm || \"\",\n    fuel_type: row.fuelType || \"\",\n    app_description:\
          \ Array.isArray(row.appDesList) ? row.appDesList.join(\", \") : \"\"\n \
          \ }));\n\n  if (!vehicles.length) {\n    return {\n      success: false,\n\
          \      part_no,\n      vehicle_count: 0,\n      vehicles_json: \"[]\",\n\
          \      result: `料号 ${part_no} 未查询到适配车型。`\n    };\n  }\n\n  const lines =\
          \ [];\n  lines.push(`料号 ${part_no}（${part_name || \"-\"}）适配车型查询完成。ECAT 共返回\
          \ ${total} 条，当前展示 ${vehicles.length} 条。`);\n  lines.push(\"\");\n  lines.push(\"\
          | 序号 | car_id | 车型信息 | 年款/生产年 | 发动机 | 排量 |\");\n  lines.push(\"|---:|---|---|---|---|---|\"\
          );\n  vehicles.forEach(v => {\n    lines.push(`| ${v.index} | ${v.car_id\
          \ || \"-\"} | ${v.display_name || \"-\"} | ${v.year_range || v.model_year\
          \ || \"-\"} | ${v.engine || \"-\"} | ${v.displacement || \"-\"} |`);\n \
          \ });\n  if (total > vehicles.length) {\n    lines.push(\"\");\n    lines.push(`注：当前\
          \ workflow 默认展示前 ${vehicles.length} 条；ECAT 总数为 ${total} 条。`);\n  }\n\n \
          \ return {\n    success: true,\n    part_no,\n    vehicle_count: total,\n\
          \    vehicles_json: JSON.stringify(vehicles, null, 2),\n    result: lines.join(\"\
          \\n\")\n  };\n}"
        code_language: javascript
        desc: Format fitment vehicle list.
        outputs:
