    - data:
        code: "function safeJsonParse(value, fallback) {\n  if (!value) return fallback;\n\
          \  if (typeof value === \"object\") return value;\n  try {\n    return JSON.parse(value);\n\
          \  } catch (e) {\n    return fallback;\n  }\n}\n\nfunction normalize(v)\
          \ {\n  return String(v || \"\").trim().replace(/\\s+/g, \"\").toUpperCase();\n\
          }\n\nfunction main({ http_body, part_no, is_valid, validation_message })\
          \ {\n  if (!is_valid) {\n    return {\n      success: false,\n      part_id:\
          \ \"\",\n      part_no,\n      part_name: \"\",\n      status: \"\",\n \
          \     category: \"\",\n      reason: validation_message\n    };\n  }\n\n\
          \  const data = safeJsonParse(http_body, {});\n  const partList = data?.resultData?.partList\
          \ || [];\n  const target = normalize(part_no);\n  const part = partList.find(p\
          \ => normalize(p.partNo) === target) || partList[0] || null;\n\n  if (!part\
          \ || !part.partId) {\n    return {\n      success: false,\n      part_id:\
          \ \"\",\n      part_no,\n      part_name: \"\",\n      status: \"\",\n \
          \     category: \"\",\n      reason: `ECAT 未查询到料号 ${part_no} 对应的 partId。`\n\
          \    };\n  }\n\n  return {\n    success: true,\n    part_id: String(part.partId\
          \ || \"\"),\n    part_no: part.partNo || part_no,\n    part_name: part.partName\
          \ || \"\",\n    status: part.partNoStatus || \"\",\n    category: [part.category1Name,\
          \ part.category2Name].filter(Boolean).join(\" / \"),\n    reason: `已解析料号\
          \ ${part.partNo || part_no} 的 partId=${part.partId}`\n  };\n}"
        code_language: javascript
        desc: Extract partId from ECAT part result.
