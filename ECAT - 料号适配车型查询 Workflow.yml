          utf8\", \"base64\");\n  encrypted += cipher.final(\"base64\");\n  return\
          \ encodeURIComponent(encodeURIComponent(encrypted));\n}\n\nfunction main({\
          \ part_id, success, reason }) {\n  if (!success || !part_id) {\n    return\
          \ {\n      success: false,\n      query_url:\n        \"https://boschaftermarket.com.cn/ecat_backend/ecat-service/api/car/query?page=1&pageSize=1&partId=\"\
          \ +\n        encryptParam(\"__INVALID__\") +\n        \"&languageType=\"\
          \ + encryptParam(\"zh-cn\"),\n      reason\n    };\n  }\n\n  const queryUrl\
          \ =\n    \"https://boschaftermarket.com.cn/ecat_backend/ecat-service/api/car/query\"\
          \ +\n    \"?page=1\" +\n    \"&pageSize=200\" +\n    \"&partId=\" + encryptParam(part_id)\
          \ +\n    \"&languageType=\" + encryptParam(\"zh-cn\");\n\n  return { success:\
          \ true, query_url: queryUrl, reason: `构造适配车型查询 URL 成功：partId=${part_id}`\
          \ };\n}"
