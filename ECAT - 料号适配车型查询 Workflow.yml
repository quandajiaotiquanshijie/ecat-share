    - data:
        code: "const crypto = require(\"crypto\");\n\nfunction encryptParam(data)\
          \ {\n  const keyStr = \"8q7f15a4oc212ef3\";\n  const ivStr = \"8q7f15a4oc212ef3\"\
          ;\n  const text = data === undefined || data === null ? \"\" : String(data);\n\
          \  const cipher = crypto.createCipheriv(\"aes-128-cbc\", keyStr, ivStr);\n\
          \  cipher.setAutoPadding(true);\n  let encrypted = cipher.update(text, \"\
          utf8\", \"base64\");\n  encrypted += cipher.final(\"base64\");\n  return\
          \ encodeURIComponent(encodeURIComponent(encrypted));\n}\n\nfunction normalizePartNo(value)\
          \ {\n  let partNo = String(value || \"\").trim().toUpperCase().replace(/[^A-Z0-9]/g,\
          \ \"\");\n  if (partNo.length > 10) partNo = partNo.slice(0, 10);\n  return\
          \ partNo;\n}\n\nfunction main({ part_no }) {\n  const partNo = normalizePartNo(part_no);\n\
          \  const isValid = /^[A-Z0-9]{6,10}$/.test(partNo);\n  const queryPartNo\
          \ = isValid ? partNo : \"__INVALID__\";\n  const queryUrl =\n    \"https://boschaftermarket.com.cn/ecat_backend/ecat-service/api/part/global/list\"\
          \ +\n    \"?page=1\" +\n    \"&pageSize=20\" +\n    \"&partNo=\" + encryptParam(queryPartNo)\
          \ +\n    \"&languageType=\" + encryptParam(\"zh-cn\");\n\n  return {\n \
          \   part_no: partNo,\n    is_valid: isValid,\n    validation_message: isValid\
          \ ? \"Part number format is valid.\" : \"请输入有效 Bosch 料号。\",\n    query_url:\
          \ queryUrl\n  };\n}"
        code_language: javascript
        desc: Normalize part_no and build ECAT part lookup URL.
